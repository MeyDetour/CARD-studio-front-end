name: Continuous Deployment to Proxmox

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Récupérer le code source sur GitHub
        uses: actions/checkout@v4

      - name: 2. Copier les fichiers sur Proxmox via SCP (Sécurisé)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROXMOX_VM_IP }}
          username: ${{ secrets.PROXMOX_SSH_USER }}
          key: ${{ secrets.PROXMOX_SSH_KEY }}
          port: 22
          source: "." 
          target: "/var/www/html/CARD-studio-front-end"

      - name: 3. Lancer la compilation et le conteneur Apache sur Proxmox
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROXMOX_VM_IP }}
          username: ${{ secrets.PROXMOX_SSH_USER }}
          key: ${{ secrets.PROXMOX_SSH_KEY }}
          port: 22
          script: |
            cd /var/www/html/CARD-studio-front-end
            
            # 1. On build l'image de PROD (Apache)
            sudo docker build --target prod -t card-studio-frontend:latest .
            
            # 2. On relance le conteneur sur le port 8080 avec l'image fraîche
            sudo docker compose up -d --force-recreate
            
            # 3. 🔒 NETTOYAGE RADICAL ET SÛR : 
            # On trouve tous les fichiers/dossiers SAUF 'docker-compose.yml' et on les supprime.
            find . -maxdepth 1 ! -name 'docker-compose.yml' ! -name '.' -exec rm -rf {} +