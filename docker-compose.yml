services:
  card-studio:
    image: card-studio-frontend:latest # <--- Doit être identique au nom après le "-t" au-dessus
    container_name: card-studio-front-prod

    restart: always
    build:
      context: .
      target: dev
    ports:
      - "8080:80"  
    volumes:
      # Synchronise ton code local avec le conteneur pour le Live Reload
      - .:/app
      # Évite que ton dossier node_modules local n'écrase celui du conteneur (très important !)
      - /app/node_modules
    environment:
      # Optionnel : Force React/Vite à détecter correctement les changements de fichiers sous Linux
      - WATCHPACK_POLLING=true
 
 